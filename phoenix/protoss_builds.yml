# PhoenixBot opening builds, executed by the ares build runner.
# After the opening completes, macro controllers in bot/main.py take over.
# Docs: https://aressc2.github.io/ares-sc2/tutorials/build_runner.html

UseData: True
BuildSelection: WinrateBased
MinGamesWinrateBased: 3

BuildChoices:
    # active when Debug: True in config.yml
    test_123:
        BotName: Test
        Cycle:
            - SafeExpand
            - GateExpand

    Protoss:
        BotName: ProtossRace
        Cycle:
            - SafeExpand
            - GateExpand

    Random:
        BotName: RandomRace
        Cycle:
            - SafeExpand
            - GateExpand

    Terran:
        BotName: TerranRace
        Cycle:
            - SafeExpand
            - GateExpand

    Zerg:
        BotName: ZergRace
        Cycle:
            - SafeExpand
            - GateExpand

Builds:
    # units-first opening for rush-prone opponents: two gates and zealots
    # before the expansion
    SafeExpand:
        ConstantWorkerProductionTill: 44
        OpeningBuildOrder:
            # full ramp wall (pylon+gateway+core) - ling floods bounce off it
            - 14 pylon @ ramp
            - 15 gateway @ ramp
            - 15 worker_scout
            - 16 gas
            - 19 core @ ramp
            - 19 zealot
            - 22 pylon
            - 22 gateway
            - 23 zealot
            - 27 expand
            - 27 gas

    GateExpand:
        ConstantWorkerProductionTill: 44
        OpeningBuildOrder:
            - 14 pylon @ ramp
            - 15 gateway
            - 15 worker_scout
            - 16 gas
            - 17 gas
            - 19 core
            - 20 expand
            - 20 pylon
            - 21 chrono @ nexus
            - 22 gate
            - 23 gate
